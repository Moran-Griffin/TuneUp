<h2>iOS only, or cross-platform?</h2>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>iOS only (for now)</h3>
      <p>Ship fast, target iPhone. Android can come later if needed.</p>

  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Cross-platform from the start</h3>
      <p>iOS and Android both supported. Slightly more setup, but one codebase covers both.</p>
    </div>
  </div>
</div>
